<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jaanu ❤️</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #ffb3c1;
            --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        .photo-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            border: 4px solid var(--primary-pink);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eee;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { color: var(--primary-pink); margin-bottom: 1.5rem; font-size: 1.8rem; }
        
        .btn-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            position: relative;
            height: 60px;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        #yesBtn { background: var(--primary-pink); color: white; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3); }
        #yesBtn:hover { transform: scale(1.05); background: #ff3355; }

        #noBtn {
            background: #f0f0f0;
            color: #666;
            position: absolute;
            white-space: nowrap;
            z-index: 5;
        }

        .hidden { display: none; }
        .success-text { color: var(--primary-pink); font-size: 1.5rem; font-weight: bold; }

        /* Floating hearts background */
        .heart {
            position: absolute;
            color: var(--soft-pink);
            font-size: 20px;
            animation: float 4s ease-in infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card" id="quizCard">
        <div class="photo-frame">
            <!-- Replace the URL below with her actual photo link -->
            <img id="herPhoto" src="https://placeholder.com" alt="Jaanu">
        </div>
        <h1>Will you be my Valentine, Jaanu? 🌹</h1>
        <div class="btn-container">
            <button id="yesBtn">Yes! ❤️</button>
            <button id="noBtn">No 💔</button>
        </div>
    </div>

    <div class="card hidden" id="successCard">
        <p class="success-text">Yay! I knew you'd say yes, Jaanu! ❤️</p>
        <p>I love you! 🥰</p>
        <div style="font-size: 3rem; margin-top: 1rem;">👩‍❤️‍👨</div>
    </div>

    <script>
        // UPDATE THIS LINE WITH HER PHOTO URL
        const herPhotoUrl = 'YOUR_PHOTO_URL_HERE';
        if(herPhotoUrl !== 'YOUR_PHOTO_URL_HERE') {
            document.getElementById('herPhoto').src = herPhotoUrl;
        }

        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const quizCard = document.getElementById('quizCard');
        const successCard = document.getElementById('successCard');

        // Logic for the runaway No button
        const moveButton = () => {
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        };

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton); // For mobile support

        yesBtn.addEventListener('click', () => {
            quizCard.classList.add('hidden');
            successCard.classList.remove('hidden');
            
            // Celebration confetti
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
              confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#ff4d6d', '#ffb3c1']
              });
              confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#ff4d6d', '#ffb3c1']
              });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());
        });

        // Add some background floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
