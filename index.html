<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <!-- We use the Canvas-Confetti library for the celebration effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffeef2;
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow: hidden;
        }
        h1 { color: #d63384; font-size: 2.5rem; }
        .container { position: relative; width: 100%; max-width: 400px; height: 200px; }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }
        #yesBtn { background-color: #ff4d6d; color: white; transition: 0.3s; }
        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            transition: 0.1s ease;
            white-space: nowrap;
        }
        .hidden { display: none; }
        #success { color: #ff4d6d; }
    </style>
</head>
<body>

    <div id="quiz">
        <h1>Will you be my Valentine? 🌹</h1>
        <div class="container">
            <button id="yesBtn">Yes!</button>
            <button id="noBtn" style="left: 60%; top: 0;">No</button>
        </div>
    </div>

    <div id="success" class="hidden">
        <h1>Yay! See you on Valentine's Day! ❤️</h1>
        <img src="https://giphy.com" alt="Happy Cat" width="250">
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const quiz = document.getElementById('quiz');
        const success = document.getElementById('success');

        // This makes the "No" button jump away whenever she tries to hover over it
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.position = 'fixed';
        });

        // Trigger confetti and show the final message
        yesBtn.addEventListener('click', () => {
            quiz.classList.add('hidden');
            success.classList.remove('hidden');
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ff758f', '#ffb3c1']
            });
        });
    </script>
</body>
</html>
